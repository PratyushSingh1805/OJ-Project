{% extends "base.html" %}
{% block content %}
<div id="content-wrapper">
  <h2>Submit Solution</h2>

  <div class="row">
    <!-- Left Column: Code + Submit + AI Review -->
    <div class="col-md-8">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label>Language:</label>
          <select id="language" name="language" class="form-select">
            <option value="py">Python</option>
            <option value="cpp">C++</option>
          </select>
        </div>

        <div class="mb-3 d-flex justify-content-between align-items-center">
          <label>Code:</label>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="theme-toggle" checked>
            <label class="form-check-label" for="theme-toggle">Dark Mode</label>
          </div>
        </div>

        <div id="editor" style="height: 400px; border: 1px solid #ccc;"></div>
        <input type="hidden" id="code" name="code">

        <button type="submit" class="btn btn-success mt-3">Submit</button>
      </form>

      <h4 class="mt-5">AI Review</h4>
      <button class="btn btn-info" onclick="reviewCode()">Get AI Review</button>
      <div id="review-output" class="mt-3">
        <pre style="white-space: pre-wrap; word-break: break-word; overflow-x: hidden; overflow-y: auto; max-height: 400px;" class="p-3 border bg-light rounded w-100"></pre>
      </div>
    </div>

    <!-- Right Column: Live I/O -->
    <div class="col-md-4">
      <h5 class="mb-3">Live Compiler</h5>

      <div class="mb-3">
        <label for="custom_input">Sample Input:</label>
        <textarea id="custom_input" class="form-control" rows="6" placeholder="Enter input..."></textarea>
      </div>

      <div class="mb-3">
        <button type="button" class="btn btn-success" onclick="runCode()">Run Code</button>
      </div>

      <div class="mb-3">
        <label>Sample Output:</label>
        <pre id="output-box" class="bg-light border p-3" style="min-height: 120px;"></pre>
      </div>
    </div>
  </div>
</div>

<!-- Monaco + Logic -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
  let editor;
  const templates = {
    py: `def main():\n    # Write your code here\n    pass\n\nif __name__ == "__main__":\n    main()`,
    cpp: `#include <bits/stdc++.h>\nusing namespace std;\n\nint main() {\n    // Write your code here\n    return 0;\n}`
  };

  require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
  require(['vs/editor/editor.main'], function () {
    const langSelect = document.getElementById("language");
    const themeToggle = document.getElementById("theme-toggle");

    const getTheme = () => themeToggle.checked ? "vs-dark" : "vs";
    const getLang = () => langSelect.value;

    editor = monaco.editor.create(document.getElementById("editor"), {
      value: templates[getLang()],
      language: getLang() === 'cpp' ? 'cpp' : 'python',
      theme: getTheme(),
      automaticLayout: true,
      fontSize: 14,
      minimap: { enabled: false }
    });

    document.querySelector('form').addEventListener('submit', function () {
      document.getElementById("code").value = editor.getValue();
    });

    langSelect.addEventListener("change", () => {
      const newLang = getLang();
      const model = monaco.editor.createModel(templates[newLang], newLang === 'cpp' ? 'cpp' : 'python');
      editor.setModel(model);
    });

    themeToggle.addEventListener("change", () => {
      const isDark = themeToggle.checked;
      monaco.editor.setTheme(isDark ? "vs-dark" : "vs");

      // Apply full-page dark mode via body class
      document.body.classList.toggle("dark-mode", isDark);
    });

    // Trigger theme toggle on load
    themeToggle.dispatchEvent(new Event('change'));
  });

  function reviewCode() {
    const code = editor.getValue();
    const output = document.getElementById("review-output");
    output.innerHTML = "Reviewing...";

    fetch("{% url 'ai_review' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": "{{ csrf_token }}"
      },
      body: JSON.stringify({ code })
    })
    .then(response => response.json())
    .then(data => {
      output.innerHTML = `<pre>${data.review}</pre>`;
    })
    .catch(error => {
      output.innerHTML = "Something went wrong.";
    });
  }

  function runCode() {
    const code = editor.getValue();
    const language = document.getElementById("language").value;
    const custom_input = document.getElementById("custom_input").value;
    const outputBox = document.getElementById("output-box");

    outputBox.innerText = "Running...";

    fetch("{% url 'run_code_ajax' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": "{{ csrf_token }}"
      },
      body: JSON.stringify({ code, language, custom_input })
    })
    .then(response => response.json())
    .then(data => {
      outputBox.innerText = data.output;
    })
    .catch(error => {
      outputBox.innerText = "Error while running code.";
    });
  }
</script>
{% endblock %}
